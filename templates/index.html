<!-- Fraud Message / Email Detector - Main User Interface -->
<!DOCTYPE html>
<html>
<head>
    <title>Fraud Message Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1>Fraud Message / Email Detector</h1>

<form method="POST">

    <textarea name="message"
    rows="6"
    cols="50"
    placeholder="Enter your message or email to check for fraud "></textarea>

    <br><br>

    <button type="submit">
        Detect
    </button>

</form>
<h2>{{ result }}</h2>
</body>

</html>
